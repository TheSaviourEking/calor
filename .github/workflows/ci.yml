name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: calor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/calor_test?schema=public
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      COINBASE_COMMERCE_API_KEY: test_placeholder
      COINBASE_WEBHOOK_SECRET: test_placeholder
      RESEND_API_KEY: re_test_placeholder
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Push schema to test database
        run: bunx prisma db push --skip-generate

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

  deploy:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy web app
        run: flyctl deploy --app calor-web --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy support chat service
        run: flyctl deploy --app calor-support-chat --config mini-services/support-chat/fly.toml --dockerfile mini-services/support-chat/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy live stream service
        run: flyctl deploy --app calor-live-stream --config mini-services/live-stream/fly.toml --dockerfile mini-services/live-stream/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
