# ============================================================================
# CALŌR — Fly.io Deployment (Main Web App)
# ============================================================================
# Deploy: flyctl deploy
# Logs:   flyctl logs
# SSH:    flyctl ssh console
# ============================================================================

app = "calor-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
